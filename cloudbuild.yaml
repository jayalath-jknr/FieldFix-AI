steps:
  # ── Build Backend Docker Image ────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:latest'
      - './backend'

  # ── Push to Artifact Registry ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:latest'

  # ── Deploy to Cloud Run ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fieldfix-backend'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # ── Build Frontend ────────────────────────────────────────────
  - name: 'node:20-slim'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run build'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/fieldfix/backend:latest'
